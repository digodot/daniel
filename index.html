<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel - Monitoramento de Maré RMR</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen pb-24">

  <header class="bg-white border-b border-slate-100 sticky top-0 z-50 shadow-xs">
    <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="bg-blue-600 text-white p-2 rounded-xl shadow-md">
          <i data-lucide="waves" class="w-5 h-5"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold text-slate-900">Daniel</h1>
          <p class="text-[10px] text-slate-500 uppercase font-semibold">Seu guia na praia</p>
        </div>
      </div>
      
      <div class="relative">
        <select id="locationSelect" class="appearance-none bg-slate-100 text-slate-800 text-sm font-medium py-2 pl-3 pr-8 rounded-full border-none focus:outline-hidden focus:ring-2 focus:ring-blue-500 cursor-pointer">
          <option value="boa-viagem">📍 Boa Viagem</option>
          <option value="piedade">📍 Piedade</option>
          <option value="olinda">📍 Olinda</option>
          <option value="paiva">📍 Praia do Paiva</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500">
          <i data-lucide="chevron-down" class="w-4 h-4"></i>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 mt-6 space-y-5">

    <!-- CLIMA -->
    <section class="bg-gradient-to-br from-blue-500 to-sky-600 text-white rounded-2xl p-4 shadow-md flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div id="weatherIcon" class="bg-white/20 p-2.5 rounded-xl text-white">
          <i data-lucide="sun" class="w-6 h-6"></i>
        </div>
        <div>
          <span class="text-[10px] text-sky-100 font-bold uppercase block">Previsão do Tempo</span>
          <h3 id="weatherStatus" class="font-bold text-sm">Carregando clima...</h3>
        </div>
      </div>
      <div class="text-right">
        <span id="weatherTemp" class="text-3xl font-black block">--°C</span>
        <span id="weatherWind" class="text-[10px] text-sky-100 font-medium block">Vento: -- km/h</span>
      </div>
    </section>

    <!-- CARD STATUS -->
    <section id="statusCard" class="rounded-2xl p-5 border shadow-xs">
      <div class="flex items-center justify-between">
        <span id="statusTag" class="text-xs font-bold uppercase px-2.5 py-1 rounded-md"></span>
        <div class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
          <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span> Tempo Real
        </div>
      </div>
      <h2 id="statusTitle" class="mt-3 text-2xl font-black text-slate-950"></h2>
      <p id="statusDescription" class="text-sm text-slate-600 mt-1"></p>
      
      <div class="mt-5 grid grid-cols-2 gap-3">
        <div class="bg-white/80 p-3 rounded-xl border border-slate-100">
          <span class="text-[11px] font-medium text-slate-400 block uppercase">Próximo Evento</span>
          <span id="nextTide" class="font-bold text-slate-800 text-base block mt-0.5">--</span>
        </div>
        <div class="bg-white/80 p-3 rounded-xl border border-slate-100 flex items-center justify-between">
          <div>
            <span class="text-[11px] font-medium text-slate-400 block uppercase">Risco Tubarão</span>
            <span id="sharkRiskText" class="font-bold text-base block mt-0.5">--</span>
          </div>
          <div id="sharkIconContainer" class="p-2 rounded-lg">
            <i data-lucide="shield-alert" class="w-5 h-5"></i>
          </div>
        </div>
      </div>
    </section>

    <!-- MAPA -->
    <section class="bg-white rounded-2xl p-4 border border-slate-100 shadow-xs">
      <div id="incidentMap" class="w-full h-48 rounded-xl border overflow-hidden"></div>
    </section>

    <!-- ─── CENTRAL DE NOTÍCIAS VIA GOOGLE ALERTS REAL ─── -->
    <section class="bg-white rounded-2xl p-5 border border-slate-100 shadow-xs space-y-3">
      <div class="flex items-center justify-between border-b border-slate-100 pb-2">
        <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">
          <i data-lucide="newspaper" class="w-4 h-4 text-blue-600"></i> Alertas do Google em Tempo Real
        </h3>
        <span class="text-[9px] bg-red-50 text-red-600 font-bold px-2 py-0.5 rounded-sm uppercase">Live Feed</span>
      </div>
      
      <!-- Container das Notícias Reais -->
      <div id="newsListContainer" class="space-y-3 max-h-72 overflow-y-auto pr-1">
        <p class="text-xs text-slate-400 text-center py-4">Buscando notícias no Google Alerts...</p>
      </div>
    </section>

    <!-- GRÁFICO MARÉ -->
    <section class="bg-white rounded-2xl p-5 border border-slate-100 shadow-xs">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">
          <i data-lucide="activity" class="w-4 h-4 text-blue-500"></i> Movimento da Maré (Hoje)
        </h3>
        <span id="currentHeightTag" class="text-xs font-bold bg-blue-50 text-blue-600 px-2 py-0.5 rounded-sm">--</span>
      </div>
      <div class="w-full h-44 relative">
        <canvas id="tideChart"></canvas>
      </div>
    </section>

  </main>

  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-full max-w-xs px-4">
    <button id="btnGpsTrack" class="w-full bg-amber-500 text-slate-950 font-black text-sm py-4 rounded-full shadow-xl flex items-center justify-center gap-2.5 uppercase border-2 border-white cursor-pointer transition-transform active:scale-95">
      <i data-lucide="locate-fixed" class="w-5 h-5"></i> Monitorar via GPS
    </button>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();

      const beachData = {
        'boa-viagem': { lat: -8.1130, lng: -34.8931, name: 'Boa Viagem', status: 'atencao', title: 'Maré Enchendo Agora', desc: 'A água está cobrindo a linha de arrecifes.', nextEvent: 'Alta: 15:42 (2.2m)', sharkRisk: 'Alto', currentHeight: '1.4m' },
        'piedade': { lat: -8.1678, lng: -34.9157, name: 'Piedade', status: 'perigo', title: 'Área com Banho Restrito', desc: 'Risco crítico de incidentes com tubarões.', nextEvent: 'Alta: 15:40 (2.2m)', sharkRisk: 'Extremo', currentHeight: '1.4m' },
        'olinda': { lat: -7.9892, lng: -34.8422, name: 'Olinda', status: 'seguro', title: 'Maré Baixa Estabilizada', desc: 'Condições ideais para caminhadas na areia.', nextEvent: 'Baixa: 21:50 (0.3m)', sharkRisk: 'Baixo', currentHeight: '0.4m' },
        'paiva': { lat: -8.2323, lng: -34.9452, name: 'Cabo (Paiva)', status: 'atencao', title: 'Mar Aberto e Ondas Fortes', desc: 'Praia sem proteção de arrecifes.', nextEvent: 'Alta: 15:45 (2.1m)', sharkRisk: 'Moderado', currentHeight: '1.3m' }
      };

      let tideChart = null, map = null, vectorSource = null, userFeature = null;

      function initMap() {
        vectorSource = new ol.source.Vector();
        map = new ol.Map({
          target: 'incidentMap',
          layers: [new ol.layer.Tile({ source: new ol.source.OSM() }), new ol.layer.Vector({ source: vectorSource })],
          view: new ol.View({ center: ol.proj.fromLonLat([-34.9000, -8.1200]), zoom: 11 })
        });
      }

      async function fetchWeather(lat, lng) {
        try {
          const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
          const data = await response.json();
          if(data && data.current_weather) {
            document.getElementById('weatherTemp').innerText = `${Math.round(data.current_weather.temperature)}°C`;
            document.getElementById('weatherWind').innerText = `Vento: ${Math.round(data.current_weather.windspeed)} km/h`;
            document.getElementById('weatherStatus').innerText = "Condições locais consultadas";
          }
        } catch (e) { console.error(e); }
      }

      // ─── CONSUMINDO O GOOGLE ALERTS DE VERDADE ───
      async function fetchGoogleAlerts() {
        const listContainer = document.getElementById('newsListContainer');
        
        // Substitua o LINK_DO_SEU_FEED_RSS abaixo pelo link gerado no Google Alerts
        const googleAlertsRssUrl = "https://www.google.com.br/alerts/feeds/11490937676293588745/11786494344889835284"; 
        
        // Usamos o rss2json para converter o formato xml do Google para o app entender como JSON
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(googleAlertsRssUrl)}`;

        try {
          const response = await fetch(apiUrl);
          const data = await response.json();

          if (data.status === 'ok' && data.items.length > 0) {
            listContainer.innerHTML = '';
            
            data.items.forEach(item => {
              // Limpa tags HTML que o Google costuma enviar no meio do texto
              const cleanTitle = item.title.replace(/<\/?[^>]+(>|$)/g, "");
              const cleanDesc = item.description.replace(/<\/?[^>]+(>|$)/g, "").substring(0, 140) + '...';
              
              // Formata a data de publicação
              const pubDate = new Date(item.pubDate).toLocaleDateString('pt-BR');

              const htmlCard = `
                <div class="p-3 bg-slate-50 border border-slate-100 rounded-xl hover:bg-slate-100/70 transition-all">
                  <div class="flex items-center justify-between text-[10px] mb-1">
                    <span class="font-bold text-red-600 bg-red-50 px-1.5 py-0.5 rounded-sm">🚨 NOTÍCIA GOOGLE</span>
                    <span class="text-slate-400 font-medium">${pubDate}</span>
                  </div>
                  <h4 class="text-xs text-slate-800 font-bold leading-snug">${cleanTitle}</h4>
                  <p class="text-[11px] text-slate-600 mt-1">${cleanDesc}</p>
                  <div class="mt-2 text-right">
                    <a href="${item.link}" target="_blank" rel="noopener" class="text-[11px] text-blue-600 font-bold hover:underline inline-flex items-center gap-0.5">
                      Ler notícia completa <i data-lucide="external-link" class="w-3 h-3"></i>
                    </a>
                  </div>
                </div>
              `;
              listContainer.insertAdjacentHTML('beforeend', htmlCard);
            });
          } else {
            listContainer.innerHTML = `<p class="text-xs text-slate-400 text-center py-4">Nenhum alerta recente encontrado para os termos configurados.</p>`;
          }
        } catch (error) {
          console.error("Erro ao carregar o Google Alerts:", error);
          listContainer.innerHTML = `<p class="text-xs text-red-400 text-center py-4">Não foi possível carregar as notícias automáticas agora.</p>`;
        }
        lucide.createIcons();
      }

      function updateDashboard(beachKey) {
        const data = beachData[beachKey];
        if (!data) return;

        document.getElementById('statusTitle').innerText = data.title;
        document.getElementById('statusDescription').innerText = data.desc;
        document.getElementById('nextTide').innerText = data.nextEvent;
        document.getElementById('sharkRiskText').innerText = data.sharkRisk;
        document.getElementById('currentHeightTag').innerText = `Altura: ${data.currentHeight}`;

        fetchWeather(data.lat, data.lng);

        const card = document.getElementById('statusCard');
        const tag = document.getElementById('statusTag');
        card.className = "rounded-2xl p-5 border transition-all duration-300 shadow-xs ";
        tag.className = "text-xs font-bold uppercase tracking-wider px-2.5 py-1 rounded-md ";

        if (data.status === 'seguro') { card.classList.add('bg-emerald-50', 'border-emerald-200'); tag.classList.add('bg-emerald-500', 'text-white'); tag.innerText = '✓ Seguro'; }
        else if (data.status === 'atencao') { card.classList.add('bg-amber-50', 'border-amber-200'); tag.classList.add('bg-amber-500', 'text-white'); tag.innerText = '⚠️ Atenção'; }
        else if (data.status === 'perigo') { card.classList.add('bg-red-50', 'border-red-200'); tag.classList.add('bg-red-500', 'text-white'); tag.innerText = '🚨 Risco Crítico'; }

        renderChart(data.status);
        if (map) { map.getView().animate({ center: ol.proj.fromLonLat([data.lng, data.lat]), zoom: 14, duration: 1000 }); }
      }

      function renderChart(status) {
        const ctx = document.getElementById('tideChart').getContext('2d');
        if (tideChart) tideChart.destroy();
        let lineColor = status === 'perigo' ? '#dc2626' : (status === 'atencao' ? '#d97706' : '#2563eb');
        const labels = Array.from({length: 24}, (_, i) => `${String(i).padStart(2, '0')}:00`);
        const dataPoints = labels.map((_, i) => Math.sin((i - 6) * 0.5) * 1 + 1.2); 
        const currentHour = new Date().getHours();

        tideChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              { data: dataPoints, borderColor: lineColor, borderWidth: 3, pointRadius: 0, fill: true, backgroundColor: lineColor + '15', tension: 0.4 },
              { label: 'Agora', data: labels.map((_, i) => i === currentHour ? dataPoints[currentHour] : null), pointRadius: 8, pointBackgroundColor: '#3b82f6', pointBorderColor: '#ffffff', pointBorderWidth: 3, showLine: false }
            ]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: true, grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 }, maxTicksLimit: 4 } }, y: { display: true, grid: { color: '#f1f5f9' }, ticks: { color: '#94a3b8', font: { size: 10 } } } } }
        });
      }

      document.getElementById('locationSelect').addEventListener('change', (e) => updateDashboard(e.target.value));

      initMap();
      updateDashboard('boa-viagem');
      // Dispara a busca real no Google Alerts ao abrir
      fetchGoogleAlerts();
    });
  </script>
</body>
</html>
